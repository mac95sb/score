<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0f0e17"/>
  <!-- Staff lines -->
  <line x1="5" y1="12" x2="27" y2="12" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="20" x2="27" y2="20" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="24" x2="27" y2="24" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- First note: on line 3 (lower pitch), stem up -->
  <ellipse cx="11" cy="20" rx="3" ry="2" transform="rotate(-15 11 20)" fill="#818cf8"/>
  <line x1="14" y1="19" x2="14" y2="11" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Second note: on line 2 (higher pitch), stem up -->
  <ellipse cx="21" cy="16" rx="3" ry="2" transform="rotate(-15 21 16)" fill="#c7d2fe"/>
  <line x1="24" y1="15" x2="24" y2="7" stroke="#c7d2fe" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Beam: ascending left-to-right -->
  <line x1="14" y1="11" x2="24" y2="7" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
</svg>
