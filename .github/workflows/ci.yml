name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Format lint
        run: swift format lint --recursive Sources Tests Documentation.docc/Resources Package.swift scripts/format-doc-snippets.swift

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build/artifacts
            .build/checkouts
            .build/repositories
            ~/.cache/org.swift.swiftpm
          key: ${{ runner.os }}-swift-6.2-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.2-spm-

      - name: Install system dependencies
        run: sudo apt-get install -y libsqlite3-dev

      - name: Build
        run: swift build -c release

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build/artifacts
            .build/checkouts
            .build/repositories
            ~/.cache/org.swift.swiftpm
          key: ${{ runner.os }}-swift-6.2-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.2-spm-

      - name: Install system dependencies
        run: sudo apt-get install -y libsqlite3-dev

      - name: Test
        run: swift test --parallel
