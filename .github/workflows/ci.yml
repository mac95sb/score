name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Install system dependencies
        run: sudo apt-get install -y libsqlite3-dev

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test --parallel

      - name: Format lint
        run: swift format lint --recursive Sources Tests Documentation.docc/Resources Package.swift scripts/format-doc-snippets.swift
